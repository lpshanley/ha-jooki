name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version in manifest
        run: |
          version="${{ github.event.release.tag_name }}"
          jq --arg v "$version" '.version = $v' custom_components/jooki/manifest.json > tmp.json
          mv tmp.json custom_components/jooki/manifest.json

      - name: Package integration
        run: |
          cd custom_components
          zip -r ../jooki.zip jooki/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: jooki.zip
